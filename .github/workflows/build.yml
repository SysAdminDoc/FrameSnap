name: Build FrameSnap

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            exe: FrameSnap.exe
            artifact: FrameSnap-windows.exe
          - os: macos-latest
            exe: FrameSnap
            artifact: FrameSnap-macos
          - os: ubuntu-latest
            exe: FrameSnap
            artifact: FrameSnap-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxcb-xinerama0 libxcb-cursor0 libxcb1 \
            libgl1 libegl1 libdbus-1-3 \
            libxkbcommon0 libxkbcommon-x11-0

      - name: Install Python dependencies
        run: pip install PyQt6 opencv-python numpy Pillow pyinstaller

      - name: Build icon (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size icon.png --out icon.iconset/icon_${size}x${size}.png
          done
          iconutil -c icns icon.iconset

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: >
          pyinstaller --onefile --noconsole --name FrameSnap
          --icon icon.ico
          --add-data "icon.svg;."
          framesnap.py

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: >
          pyinstaller --onefile --noconsole --name FrameSnap
          --icon icon.icns
          --add-data "icon.svg:."
          framesnap.py

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: >
          pyinstaller --onefile --noconsole --name FrameSnap
          --add-data "icon.svg:."
          framesnap.py

      - name: Stage artifact
        shell: bash
        run: mv "dist/${{ matrix.exe }}" "dist/${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
